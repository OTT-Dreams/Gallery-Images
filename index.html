<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Our Memories ♡</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Raleway:wght@200;300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0d0608;
      --bg2:        #110a0d;
      --surface:    #1a0e12;
      --surface2:   #22121a;
      --border:     #3a1a26;
      --border2:    #4d2535;
      --crimson:    #8b1a2e;
      --rose:       #c24b6e;
      --rose-light: #e8789a;
      --blush:      #f0aec3;
      --gold:       #c9935a;
      --gold-light: #e8b87a;
      --text:       #f0dde5;
      --text2:      #c9a8b8;
      --muted:      #7a4a5e;
      --white:      #fff0f5;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Raleway', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Deep atmospheric background ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 55% at 15% 10%, rgba(139,26,46,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 55% 45% at 85% 85%, rgba(194,75,110,0.12) 0%, transparent 55%),
        radial-gradient(ellipse 40% 35% at 50% 50%, rgba(201,147,90,0.06) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Floating embers / petals ── */
    .sparks {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 1;
    }

    .spark {
      position: absolute;
      bottom: -40px;
      opacity: 0;
      animation: riseUp linear infinite;
      user-select: none;
      font-size: 0.9rem;
    }

    @keyframes riseUp {
      0%   { opacity: 0; transform: translateY(0) rotate(0deg) translateX(0); }
      15%  { opacity: 0.6; }
      85%  { opacity: 0.35; }
      100% { opacity: 0; transform: translateY(-110vh) rotate(540deg) translateX(50px); }
    }

    /* ── Stars / twinkling dots ── */
    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .star {
      position: absolute;
      width: 2px; height: 2px;
      border-radius: 50%;
      background: var(--blush);
      animation: twinkle ease infinite;
    }

    @keyframes twinkle {
      0%,100% { opacity: 0.1; transform: scale(1); }
      50%      { opacity: 0.7; transform: scale(1.6); }
    }

    /* ── HEADER ── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.1rem 2.5rem;
      background: rgba(13,6,8,0.82);
      backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 1px 0 rgba(201,147,90,0.08), 0 4px 30px rgba(0,0,0,0.5);
    }

    .logo { display: flex; flex-direction: column; line-height: 1; }

    .logo-main {
      font-family: 'Great Vibes', cursive;
      font-size: 2.1rem;
      background: linear-gradient(135deg, var(--rose-light), var(--gold-light), var(--blush));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.04em;
      filter: drop-shadow(0 0 12px rgba(232,120,154,0.4));
    }

    .logo-sub {
      font-size: 0.5rem;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 0.2rem;
      padding-left: 2px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 1.6rem;
    }

    .photo-count {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.6rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .heart-pulse {
      color: var(--rose);
      font-size: 0.85rem;
      animation: heartPulse 1.8s ease infinite;
      filter: drop-shadow(0 0 6px rgba(194,75,110,0.6));
    }

    @keyframes heartPulse {
      0%,100% { transform: scale(1); }
      35%      { transform: scale(1.35); }
      65%      { transform: scale(0.92); }
    }

    .view-toggle { display: flex; gap: 0.35rem; }

    .view-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      cursor: pointer;
      padding: 0.32rem 0.75rem;
      border-radius: 20px;
      font-size: 0.62rem;
      font-family: 'Raleway', sans-serif;
      letter-spacing: 0.1em;
      transition: all 0.28s;
    }

    .view-btn.active, .view-btn:hover {
      background: var(--crimson);
      border-color: var(--rose);
      color: var(--blush);
      box-shadow: 0 0 14px rgba(139,26,46,0.5);
    }

    /* ── HERO ── */
    .hero {
      text-align: center;
      padding: 9rem 2rem 3rem;
      position: relative;
      z-index: 2;
    }

    .hero-eyebrow {
      font-size: 0.55rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1rem;
      filter: drop-shadow(0 0 8px rgba(201,147,90,0.4));
    }

    .hero-title {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(3rem, 8.5vw, 6rem);
      background: linear-gradient(160deg, var(--blush) 0%, var(--rose-light) 40%, var(--gold-light) 80%, var(--blush) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.15;
      margin-bottom: 0.8rem;
      filter: drop-shadow(0 0 30px rgba(232,120,154,0.3));
      animation: titleGlow 4s ease infinite alternate;
    }

    @keyframes titleGlow {
      from { filter: drop-shadow(0 0 20px rgba(232,120,154,0.25)); }
      to   { filter: drop-shadow(0 0 40px rgba(232,120,154,0.5)); }
    }

    .hero-subtitle {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1rem;
      color: var(--text2);
      letter-spacing: 0.05em;
    }

    .hero-divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      margin: 1.6rem auto 0;
      max-width: 320px;
    }

    .divider-line {
      flex: 1; height: 1px;
      background: linear-gradient(90deg, transparent, var(--border2));
    }

    .divider-line.r {
      background: linear-gradient(90deg, var(--border2), transparent);
    }

    .divider-icon {
      color: var(--gold);
      font-size: 0.85rem;
      filter: drop-shadow(0 0 6px rgba(201,147,90,0.5));
    }

    /* ── MAIN ── */
    main {
      padding: 1.5rem 2rem 6rem;
      max-width: 1600px;
      margin: 0 auto;
      position: relative;
      z-index: 2;
    }

    /* ── GALLERY ── */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(255px, 1fr));
      gap: 14px;
      opacity: 0;
      animation: fadeUp 0.9s ease forwards;
    }

    .gallery.list-view {
      grid-template-columns: 1fr;
      gap: 10px;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── PHOTO CARD ── */
    .photo-card {
      position: relative;
      aspect-ratio: 1;
      overflow: hidden;
      cursor: pointer;
      background: var(--surface);
      border-radius: 16px;
      border: 1px solid var(--border);
      box-shadow:
        0 4px 24px rgba(0,0,0,0.5),
        0 0 0 0 rgba(194,75,110,0);
      animation: cardReveal 0.6s cubic-bezier(0.34,1.46,0.64,1) both;
      transition: box-shadow 0.4s ease, transform 0.4s ease, border-color 0.4s ease;
    }

    @keyframes cardReveal {
      from { opacity: 0; transform: scale(0.87) translateY(14px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .photo-card:hover {
      border-color: var(--border2);
      box-shadow:
        0 0 0 1px rgba(194,75,110,0.35),
        0 16px 50px rgba(0,0,0,0.7),
        0 0 35px rgba(139,26,46,0.3);
      transform: translateY(-6px) scale(1.018);
    }

    .gallery.list-view .photo-card {
      aspect-ratio: 16/5;
      border-radius: 12px;
    }

    .photo-card img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      border-radius: 16px;
      transition: transform 0.65s cubic-bezier(0.25,0.46,0.45,0.94), filter 0.45s ease;
      filter: brightness(0.8) saturate(0.85) sepia(0.12);
    }

    .photo-card:hover img {
      transform: scale(1.08);
      filter: brightness(0.95) saturate(1.1) sepia(0.05);
    }

    .photo-overlay {
      position: absolute; inset: 0;
      border-radius: 16px;
      background: linear-gradient(
        to top,
        rgba(8,2,5,0.88) 0%,
        rgba(80,15,35,0.4) 40%,
        transparent 75%
      );
      opacity: 0;
      transition: opacity 0.38s ease;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: flex-end;
      padding: 1rem 1.1rem 1rem;
      gap: 0.2rem;
    }

    .photo-card:hover .photo-overlay { opacity: 1; }

    .photo-name {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 0.8rem;
      color: var(--blush);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
      letter-spacing: 0.03em;
    }

    /* rose glow top-left corner accent on hover */
    .photo-card::after {
      content: '';
      position: absolute;
      inset: 0; border-radius: 16px;
      background: radial-gradient(circle at 0% 0%, rgba(194,75,110,0.15) 0%, transparent 50%);
      opacity: 0;
      transition: opacity 0.4s;
      pointer-events: none;
    }

    .photo-card:hover::after { opacity: 1; }

    /* ── FAV BUTTON ── */
    .fav-btn {
      position: absolute;
      top: 0.65rem; right: 0.65rem;
      background: rgba(13,6,8,0.75);
      backdrop-filter: blur(6px);
      border: 1px solid var(--border);
      border-radius: 50%;
      width: 34px; height: 34px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 0.9rem;
      opacity: 0;
      transform: scale(0.65);
      transition: opacity 0.3s, transform 0.3s, box-shadow 0.3s;
      z-index: 5;
    }

    .photo-card:hover .fav-btn { opacity: 1; transform: scale(1); }
    .fav-btn.loved {
      opacity: 1 !important;
      transform: scale(1) !important;
      border-color: var(--rose);
      box-shadow: 0 0 12px rgba(194,75,110,0.5);
    }

    /* ── LOADING ── */
    .loading-screen {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at 50% 40%, #1a0812 0%, #0d0608 70%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 1000; gap: 1.8rem;
      transition: opacity 0.8s ease, visibility 0.8s;
    }

    .loading-screen.hidden { opacity: 0; visibility: hidden; }

    .loading-heart {
      font-size: 3.5rem;
      animation: loadHeart 1.2s ease infinite;
      filter: drop-shadow(0 0 20px rgba(194,75,110,0.7));
    }

    @keyframes loadHeart {
      0%,100% { transform: scale(1); }
      50%      { transform: scale(1.3); }
    }

    .loading-title {
      font-family: 'Great Vibes', cursive;
      font-size: 3.2rem;
      background: linear-gradient(135deg, var(--rose-light), var(--gold-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 16px rgba(194,75,110,0.4));
    }

    .loader-track {
      width: 200px; height: 1px;
      background: var(--border);
      border-radius: 1px;
      overflow: hidden;
      position: relative;
    }

    .loader-track::after {
      content: '';
      position: absolute;
      top: 0; left: -60%;
      width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, var(--rose), var(--gold), transparent);
      animation: scanLine 1.4s ease infinite;
    }

    @keyframes scanLine {
      to { left: 100%; }
    }

    .loading-text {
      font-size: 0.58rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── MESSAGE BOX ── */
    .message-box {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 40vh; gap: 1rem;
      text-align: center; grid-column: 1/-1;
    }

    .message-box h2 {
      font-family: 'Great Vibes', cursive;
      font-size: 3rem;
      color: var(--muted);
    }

    .message-box p {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    /* ── LIGHTBOX ── */
    .lightbox {
      position: fixed; inset: 0; z-index: 500;
      display: flex; align-items: center; justify-content: center;
      background: rgba(4,1,3,0.96);
      backdrop-filter: blur(18px);
      opacity: 0; visibility: hidden;
      transition: opacity 0.4s ease, visibility 0.4s;
    }

    .lightbox.open { opacity: 1; visibility: visible; }

    /* Candle glow corners */
    .lightbox-glow {
      position: absolute;
      width: 350px; height: 350px;
      border-radius: 50%;
      pointer-events: none;
    }

    .lightbox-glow.tl {
      top: -80px; left: -80px;
      background: radial-gradient(circle, rgba(139,26,46,0.2) 0%, transparent 70%);
    }

    .lightbox-glow.br {
      bottom: -80px; right: -80px;
      background: radial-gradient(circle, rgba(201,147,90,0.12) 0%, transparent 70%);
    }

    .lightbox-inner {
      position: relative;
      display: flex; flex-direction: column;
      align-items: center; gap: 1.3rem;
      max-width: 92vw;
    }

    .lightbox img {
      max-width: 88vw;
      max-height: 74vh;
      object-fit: contain;
      display: block;
      border-radius: 18px;
      box-shadow:
        0 0 0 1px rgba(194,75,110,0.2),
        0 0 0 3px rgba(139,26,46,0.1),
        0 35px 90px rgba(0,0,0,0.85),
        0 0 80px rgba(139,26,46,0.2);
      transform: scale(0.93);
      transition: transform 0.45s cubic-bezier(0.34,1.46,0.64,1);
    }

    .lightbox.open img { transform: scale(1); }

    .lb-btn {
      position: absolute;
      top: 50%; transform: translateY(-50%);
      background: rgba(26,14,18,0.7);
      border: 1px solid var(--border2);
      color: var(--text2); cursor: pointer;
      width: 50px; height: 50px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem;
      transition: all 0.3s; z-index: 10;
      backdrop-filter: blur(8px);
    }

    .lb-btn:hover {
      background: rgba(139,26,46,0.5);
      border-color: var(--rose);
      color: var(--blush);
      box-shadow: 0 0 20px rgba(139,26,46,0.5);
    }

    .lb-prev { left: -70px; }
    .lb-next { right: -70px; }

    .lb-close {
      position: absolute;
      top: -3rem; right: 0;
      background: rgba(26,14,18,0.7);
      border: 1px solid var(--border);
      color: var(--muted); cursor: pointer;
      width: 36px; height: 36px; border-radius: 50%;
      font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.25s;
      backdrop-filter: blur(6px);
    }

    .lb-close:hover { border-color: var(--rose); color: var(--blush); box-shadow: 0 0 12px rgba(194,75,110,0.4); }

    .lightbox-meta {
      display: flex; align-items: center;
      justify-content: center; gap: 1.8rem; flex-wrap: wrap;
    }

    .lightbox-name {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 0.9rem;
      color: var(--text2);
      letter-spacing: 0.04em;
    }

    .lightbox-counter {
      font-size: 0.6rem;
      letter-spacing: 0.22em;
      color: var(--rose);
      text-transform: uppercase;
      filter: drop-shadow(0 0 6px rgba(194,75,110,0.5));
    }

    .lb-open-drive {
      font-size: 0.58rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold);
      text-decoration: none;
      border-bottom: 1px solid rgba(201,147,90,0.35);
      padding-bottom: 1px;
      transition: all 0.2s;
      filter: drop-shadow(0 0 5px rgba(201,147,90,0.3));
    }

    .lb-open-drive:hover {
      color: var(--gold-light);
      border-color: var(--gold-light);
      filter: drop-shadow(0 0 10px rgba(201,147,90,0.6));
    }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 1.4rem 2.5rem;
      display: flex; align-items: center; justify-content: space-between;
      position: relative; z-index: 2;
      background: rgba(13,6,8,0.6);
    }

    .footer-brand {
      font-family: 'Great Vibes', cursive;
      font-size: 1.5rem;
      background: linear-gradient(90deg, var(--rose-light), var(--gold-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 8px rgba(194,75,110,0.3));
    }

    footer span {
      font-size: 0.58rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--crimson); border-radius: 2px; }

    /* ── RESPONSIVE ── */
    @media (max-width: 640px) {
      header { padding: 0.9rem 1rem; }
      .logo-main { font-size: 1.7rem; }
      .hero { padding: 7.5rem 1rem 2rem; }
      main { padding: 1rem 0.8rem 4rem; }
      .gallery { grid-template-columns: repeat(2, 1fr); gap: 8px; }
      .header-right { gap: 0.7rem; }
      .lb-prev { left: -8px; }
      .lb-next { right: -8px; }
      .lb-btn { width: 38px; height: 38px; font-size: 1.1rem; }
    }
  </style>
</head>
<body>

<!-- Stars -->
<div class="stars" id="stars"></div>

<!-- Rising petals / sparks -->
<div class="sparks" id="sparks"></div>

<!-- Loading -->
<div class="loading-screen" id="loadingScreen">
  <div class="loading-heart">🖤</div>
  <div class="loading-title">Our Memories</div>
  <div class="loader-track"></div>
  <div class="loading-text" id="loadingText">Gathering your moments…</div>
</div>

<!-- Header -->
<header>
  <div class="logo">
    <span class="logo-main">Our Memories</span>
    <span class="logo-sub">A Love Story in Photos</span>
  </div>
  <div class="header-right">
    <div class="photo-count">
      <span class="heart-pulse">♥</span>
      <span id="photoCount">— memories</span>
    </div>
    <div class="view-toggle">
      <button class="view-btn active" id="gridBtn" onclick="setView('grid')">♡ Grid</button>
      <button class="view-btn" id="listBtn" onclick="setView('list')">≡ List</button>
    </div>
  </div>
</header>

<!-- Hero -->
<div class="hero">
  <p class="hero-eyebrow">✦ cherished forever ✦</p>
  <h1 class="hero-title">Every Picture Tells Our Story</h1>
  <p class="hero-subtitle">A collection of beautiful moments, kept close to the heart</p>
  <div class="hero-divider">
    <div class="divider-line"></div>
    <span class="divider-icon">✦</span>
    <div class="divider-line r"></div>
  </div>
</div>

<!-- Gallery -->
<main>
  <div class="gallery" id="gallery"></div>
</main>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightboxOnBg(event)">
  <div class="lightbox-glow tl"></div>
  <div class="lightbox-glow br"></div>
  <div class="lightbox-inner">
    <button class="lb-close" onclick="closeLightbox()">✕</button>
    <div style="position:relative">
      <button class="lb-btn lb-prev" onclick="navigate(-1)">‹</button>
      <img id="lightboxImg" src="" alt="" />
      <button class="lb-btn lb-next" onclick="navigate(1)">›</button>
    </div>
    <div class="lightbox-meta">
      <span class="lightbox-name" id="lightboxName"></span>
      <span class="lightbox-counter" id="lightboxCounter"></span>
      <a class="lb-open-drive" id="lightboxLink" href="#" target="_blank">Open in Drive ↗</a>
    </div>
  </div>
</div>

<!-- Footer -->
<footer>
  <div class="footer-brand">Our Memories ♡</div>
  <span id="footerCount"></span>
</footer>

<script>
  const API_KEY   = 'AIzaSyDutn48HU6P7Ichd9ckaTnJV2anbjuoudY';
  const FOLDER_ID = '1K4gnMOKUdTZ4_s-6zZmlgij7ocqJWRP3';

  let photos = [];
  let currentIndex = 0;
  let favorites = new Set();
  try { favorites = new Set(JSON.parse(localStorage.getItem('dark_photo_favs') || '[]')); } catch(e){}

  // ── Twinkling stars ──────────────────────────────────
  const starContainer = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = 1 + Math.random() * 2;
    s.style.cssText = `
      left:${Math.random()*100}%;
      top:${Math.random()*100}%;
      width:${size}px; height:${size}px;
      animation-duration:${2 + Math.random()*5}s;
      animation-delay:${-Math.random()*6}s;
      opacity:${0.1 + Math.random()*0.3};
    `;
    starContainer.appendChild(s);
  }

  // ── Rising petals ────────────────────────────────────
  const SPARKS = ['🌹','🥀','🌸','✦','❥','♡'];
  const sparkContainer = document.getElementById('sparks');
  for (let i = 0; i < 16; i++) {
    const el = document.createElement('div');
    el.className = 'spark';
    el.textContent = SPARKS[i % SPARKS.length];
    el.style.cssText = `
      left:${Math.random()*100}%;
      font-size:${0.6 + Math.random()*0.7}rem;
      animation-duration:${9 + Math.random()*12}s;
      animation-delay:${-Math.random()*16}s;
      opacity:0;
    `;
    sparkContainer.appendChild(el);
  }

  // ── Fetch photos ─────────────────────────────────────
  async function fetchPhotos(pageToken = '', acc = []) {
    if (acc.length > 0) {
      const el = document.getElementById('loadingText');
      if (el) el.textContent = `Gathering ${acc.length} memories…`;
    }
    const fields = 'nextPageToken,files(id,name,mimeType,thumbnailLink,webViewLink)';
    const q = encodeURIComponent(`'${FOLDER_ID}' in parents and mimeType contains 'image/' and trashed=false`);
    let url = `https://www.googleapis.com/drive/v3/files?q=${q}&key=${API_KEY}&fields=${encodeURIComponent(fields)}&pageSize=1000&orderBy=name`;
    if (pageToken) url += `&pageToken=${pageToken}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`API error ${res.status}: ${res.statusText}`);
    const data = await res.json();
    const all = acc.concat(data.files || []);
    if (data.nextPageToken) return fetchPhotos(data.nextPageToken, all);
    return all;
  }

  function getThumbnailUrl(file) {
    if (file.thumbnailLink) return file.thumbnailLink.replace(/=s\d+$/, '=s400');
    return `https://drive.google.com/thumbnail?id=${file.id}&sz=w400`;
  }

  function getFullUrl(file) {
    return `https://drive.google.com/thumbnail?id=${file.id}&sz=w1600`;
  }

  // ── Render gallery ────────────────────────────────────
  function renderGallery() {
    const gallery = document.getElementById('gallery');
    gallery.innerHTML = '';

    if (photos.length === 0) {
      gallery.innerHTML = `<div class="message-box">
        <h2>No memories yet</h2>
        <p>The folder seems empty — add your beautiful moments ♡</p>
      </div>`;
      return;
    }

    photos.forEach((photo, i) => {
      const isFav = favorites.has(photo.id);
      const card = document.createElement('div');
      card.className = 'photo-card';
      card.style.animationDelay = `${Math.min(i * 0.022, 0.55)}s`;
      card.innerHTML = `
        <img src="${getThumbnailUrl(photo)}" alt="${photo.name}" loading="lazy" />
        <div class="photo-overlay">
          <span class="photo-name">${photo.name.replace(/\.[^/.]+$/, '')}</span>
        </div>
        <button class="fav-btn ${isFav ? 'loved' : ''}" title="Love this">${isFav ? '❤️' : '🤍'}</button>
      `;
      card.querySelector('.fav-btn').addEventListener('click', e => {
        e.stopPropagation();
        toggleFav(photo.id, card.querySelector('.fav-btn'));
      });
      card.addEventListener('click', () => openLightbox(i));
      gallery.appendChild(card);
    });
  }

  function toggleFav(id, btn) {
    if (favorites.has(id)) {
      favorites.delete(id);
      btn.classList.remove('loved');
      btn.textContent = '🤍';
    } else {
      favorites.add(id);
      btn.classList.add('loved');
      btn.textContent = '❤️';
      btn.animate([
        { transform: 'scale(1)' },
        { transform: 'scale(1.7)' },
        { transform: 'scale(1)' }
      ], { duration: 420, easing: 'cubic-bezier(0.34,1.56,0.64,1)' });
    }
    try { localStorage.setItem('dark_photo_favs', JSON.stringify([...favorites])); } catch(e){}
  }

  // ── View toggle ───────────────────────────────────────
  function setView(view) {
    const gallery = document.getElementById('gallery');
    document.getElementById('gridBtn').classList.toggle('active', view === 'grid');
    document.getElementById('listBtn').classList.toggle('active', view === 'list');
    gallery.classList.toggle('list-view', view === 'list');
  }

  // ── Lightbox ──────────────────────────────────────────
  function openLightbox(index) {
    currentIndex = index;
    updateLightbox();
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  }

  function closeLightboxOnBg(e) {
    if (e.target === document.getElementById('lightbox')) closeLightbox();
  }

  function navigate(dir) {
    currentIndex = (currentIndex + dir + photos.length) % photos.length;
    updateLightbox();
  }

  function updateLightbox() {
    const photo = photos[currentIndex];
    const img = document.getElementById('lightboxImg');
    img.src = '';
    setTimeout(() => { img.src = getFullUrl(photo); }, 50);
    document.getElementById('lightboxName').textContent = photo.name.replace(/\.[^/.]+$/, '');
    document.getElementById('lightboxCounter').textContent = `♥ ${currentIndex + 1} of ${photos.length}`;
    document.getElementById('lightboxLink').href = photo.webViewLink || `https://drive.google.com/file/d/${photo.id}/view`;
  }

  document.addEventListener('keydown', e => {
    const lb = document.getElementById('lightbox');
    if (!lb.classList.contains('open')) return;
    if (e.key === 'Escape')     closeLightbox();
    if (e.key === 'ArrowRight') navigate(1);
    if (e.key === 'ArrowLeft')  navigate(-1);
  });

  // ── Init ──────────────────────────────────────────────
  async function init() {
    try {
      photos = await fetchPhotos();
      const count = photos.length;
      document.getElementById('photoCount').textContent = `${count} memor${count !== 1 ? 'ies' : 'y'}`;
      document.getElementById('footerCount').textContent = `${count} cherished moment${count !== 1 ? 's' : ''}`;
      renderGallery();
    } catch (err) {
      console.error(err);
      document.getElementById('gallery').innerHTML = `<div class="message-box">
        <h2>Something went wrong</h2>
        <p>${err.message}</p>
      </div>`;
    } finally {
      document.getElementById('loadingScreen').classList.add('hidden');
    }
  }

  init();
</script>
</body>
</html>
