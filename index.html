<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photo Library</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #1e1e1e;
      --text: #e8e0d5;
      --muted: #5a5550;
      --accent: #c9a96e;
      --accent2: #8b6f47;
      --white: #f5f0eb;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.35;
    }

    /* ─── HEADER ─────────────────────────────────────── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.4rem 2.5rem;
      background: rgba(10,10,10,0.85);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      color: var(--white);
    }

    .logo span { color: var(--accent); font-style: italic; }

    .header-meta {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 1.8rem;
    }

    .photo-count {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); }

    /* ─── VIEW TOGGLE ─────────────────────────────────── */
    .view-toggle {
      display: flex;
      gap: 0.4rem;
    }

    .view-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      cursor: pointer;
      padding: 0.4rem 0.6rem;
      transition: all 0.2s;
      font-size: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .view-btn.active, .view-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ─── MAIN CONTENT ────────────────────────────────── */
    main {
      padding: 7rem 2.5rem 4rem;
      max-width: 1600px;
      margin: 0 auto;
    }

    /* ─── GALLERY GRID ────────────────────────────────── */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 2px;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards;
    }

    .gallery.list-view {
      grid-template-columns: 1fr;
      gap: 1px;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ─── PHOTO CARD ──────────────────────────────────── */
    .photo-card {
      position: relative;
      aspect-ratio: 1;
      overflow: hidden;
      cursor: pointer;
      background: var(--surface);
      animation: cardReveal 0.5s ease both;
    }

    @keyframes cardReveal {
      from { opacity: 0; transform: scale(0.97); }
      to { opacity: 1; transform: scale(1); }
    }

    .gallery.list-view .photo-card {
      aspect-ratio: 16/5;
    }

    .photo-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94), filter 0.4s ease;
      filter: brightness(0.88) saturate(0.9);
    }

    .photo-card:hover img {
      transform: scale(1.06);
      filter: brightness(1) saturate(1.05);
    }

    .photo-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, transparent 50%);
      opacity: 0;
      transition: opacity 0.35s ease;
      display: flex;
      align-items: flex-end;
      padding: 1rem;
    }

    .photo-card:hover .photo-overlay { opacity: 1; }

    .photo-name {
      font-size: 0.62rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--white);
      line-height: 1.4;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }

    .photo-index {
      position: absolute;
      top: 0.7rem;
      right: 0.7rem;
      font-size: 0.55rem;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.5);
      background: rgba(0,0,0,0.4);
      padding: 0.2rem 0.4rem;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .photo-card:hover .photo-index { opacity: 1; }

    /* ─── LOADING ─────────────────────────────────────── */
    .loading-screen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      gap: 1.5rem;
      transition: opacity 0.5s, visibility 0.5s;
    }

    .loading-screen.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .loading-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.5rem;
      font-weight: 300;
      color: var(--white);
      letter-spacing: 0.15em;
    }

    .loading-logo em { color: var(--accent); font-style: italic; }

    .loader-bar {
      width: 200px;
      height: 1px;
      background: var(--border);
      position: relative;
      overflow: hidden;
    }

    .loader-bar::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      animation: slide 1.2s ease infinite;
    }

    @keyframes slide {
      to { left: 100%; }
    }

    .loading-text {
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ─── ERROR / EMPTY ───────────────────────────────── */
    .message-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 50vh;
      gap: 1rem;
      text-align: center;
    }

    .message-box h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 300;
      color: var(--muted);
    }

    .message-box p {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      color: var(--muted);
      max-width: 400px;
    }

    /* ─── LIGHTBOX ────────────────────────────────────── */
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.96);
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.35s ease, visibility 0.35s;
    }

    .lightbox.open {
      opacity: 1;
      visibility: visible;
    }

    .lightbox-inner {
      position: relative;
      max-width: 90vw;
      max-height: 88vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .lightbox-img-wrap {
      position: relative;
      max-width: 90vw;
      max-height: 80vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .lightbox img {
      max-width: 90vw;
      max-height: 80vh;
      object-fit: contain;
      display: block;
      box-shadow: 0 40px 100px rgba(0,0,0,0.8);
      transform: scale(0.95);
      transition: transform 0.35s ease;
    }

    .lightbox.open img { transform: scale(1); }

    .lightbox-meta {
      display: flex;
      align-items: center;
      gap: 2rem;
    }

    .lightbox-name {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .lightbox-counter {
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      color: var(--accent);
    }

    .lb-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--white);
      cursor: pointer;
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      transition: background 0.2s, border-color 0.2s;
      z-index: 10;
    }

    .lb-btn:hover {
      background: rgba(201,169,110,0.15);
      border-color: var(--accent);
    }

    .lb-prev { left: -70px; }
    .lb-next { right: -70px; }

    .lb-close {
      position: absolute;
      top: -3rem;
      right: 0;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1.4rem;
      line-height: 1;
      transition: color 0.2s;
      font-family: 'DM Mono', monospace;
    }

    .lb-close:hover { color: var(--white); }

    .lb-open-drive {
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent2);
      text-decoration: none;
      border-bottom: 1px solid var(--accent2);
      padding-bottom: 1px;
      transition: color 0.2s, border-color 0.2s;
    }

    .lb-open-drive:hover { color: var(--accent); border-color: var(--accent); }

    /* ─── FOOTER ──────────────────────────────────────── */
    footer {
      border-top: 1px solid var(--border);
      padding: 1.5rem 2.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 4rem;
    }

    footer span {
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ─── SCROLLBAR ───────────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ─── RESPONSIVE ──────────────────────────────────── */
    @media (max-width: 640px) {
      header { padding: 1rem 1.2rem; }
      main { padding: 5.5rem 0.5rem 3rem; }
      .gallery { grid-template-columns: repeat(2, 1fr); gap: 1px; }
      .header-meta { gap: 0.8rem; }
      .lb-prev { left: -14px; }
      .lb-next { right: -14px; }
      .lb-btn { width: 36px; height: 36px; font-size: 1rem; }
    }
  </style>
</head>
<body>

<!-- Loading Screen -->
<div class="loading-screen" id="loadingScreen">
  <div class="loading-logo">Photo<em>lib</em></div>
  <div class="loader-bar"></div>
  <div class="loading-text">Fetching from Google Drive…</div>
</div>

<!-- Header -->
<header>
  <div class="logo">Photo<span>lib</span></div>
  <div class="header-meta">
    <div class="photo-count">
      <div class="dot"></div>
      <span id="photoCount">— photos</span>
    </div>
    <div class="view-toggle">
      <button class="view-btn active" id="gridBtn" onclick="setView('grid')" title="Grid view">
        ⊞ Grid
      </button>
      <button class="view-btn" id="listBtn" onclick="setView('list')" title="List view">
        ≡ List
      </button>
    </div>
  </div>
</header>

<!-- Main -->
<main>
  <div class="gallery" id="gallery"></div>
</main>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightboxOnBg(event)">
  <div class="lightbox-inner">
    <button class="lb-close" onclick="closeLightbox()">✕</button>
    <div class="lightbox-img-wrap">
      <button class="lb-btn lb-prev" onclick="navigate(-1)">‹</button>
      <img id="lightboxImg" src="" alt="" />
      <button class="lb-btn lb-next" onclick="navigate(1)">›</button>
    </div>
    <div class="lightbox-meta">
      <span class="lightbox-name" id="lightboxName"></span>
      <span class="lightbox-counter" id="lightboxCounter"></span>
      <a class="lb-open-drive" id="lightboxLink" href="#" target="_blank">Open in Drive ↗</a>
    </div>
  </div>
</div>

<footer>
  <span>Google Drive Photo Library</span>
  <span id="footerCount"></span>
</footer>

<script>
  const API_KEY   = 'AIzaSyDutn48HU6P7Ichd9ckaTnJV2anbjuoudY';
  const FOLDER_ID = '1K4gnMOKUdTZ4_s-6zZmlgij7ocqJWRP3';

  let photos = [];
  let currentIndex = 0;
  let currentView = 'grid';

  // ─── FETCH PHOTOS ────────────────────────────────────
  async function fetchPhotos(pageToken = '', acc = []) {
    if (acc.length > 0) {
      const el = document.querySelector('.loading-text');
      if (el) el.textContent = `Loaded ${acc.length} photos…`;
    }
    const fields = 'nextPageToken,files(id,name,mimeType,thumbnailLink,webViewLink)';
    const q = encodeURIComponent(`'${FOLDER_ID}' in parents and mimeType contains 'image/' and trashed=false`);
    let url = `https://www.googleapis.com/drive/v3/files?q=${q}&key=${API_KEY}&fields=${encodeURIComponent(fields)}&pageSize=1000&orderBy=name`;
    if (pageToken) url += `&pageToken=${pageToken}`;

    const res = await fetch(url);
    if (!res.ok) throw new Error(`API error ${res.status}: ${res.statusText}`);
    const data = await res.json();

    const all = acc.concat(data.files || []);
    if (data.nextPageToken) return fetchPhotos(data.nextPageToken, all);
    return all;
  }

  // ─── THUMBNAIL URL ───────────────────────────────────
  function getThumbnailUrl(file) {
    if (file.thumbnailLink) {
      // bump resolution by replacing size param
      return file.thumbnailLink.replace(/=s\d+$/, '=s400');
    }
    return `https://drive.google.com/thumbnail?id=${file.id}&sz=w400`;
  }

  function getFullUrl(file) {
    return `https://drive.google.com/thumbnail?id=${file.id}&sz=w1600`;
  }

  // ─── RENDER GALLERY ──────────────────────────────────
  function renderGallery() {
    const gallery = document.getElementById('gallery');
    gallery.innerHTML = '';

    if (photos.length === 0) {
      gallery.innerHTML = `
        <div class="message-box" style="grid-column:1/-1">
          <h2>No photos found</h2>
          <p>The folder appears to be empty or the images aren't accessible.</p>
        </div>`;
      return;
    }

    photos.forEach((photo, i) => {
      const card = document.createElement('div');
      card.className = 'photo-card';
      card.style.animationDelay = `${Math.min(i * 0.03, 0.6)}s`;
      card.innerHTML = `
        <img src="${getThumbnailUrl(photo)}" alt="${photo.name}" loading="lazy" />
        <div class="photo-overlay">
          <span class="photo-name">${photo.name.replace(/\.[^/.]+$/, '')}</span>
        </div>
        <span class="photo-index">${String(i + 1).padStart(2, '0')}</span>
      `;
      card.addEventListener('click', () => openLightbox(i));
      gallery.appendChild(card);
    });
  }

  // ─── VIEW TOGGLE ─────────────────────────────────────
  function setView(view) {
    currentView = view;
    const gallery = document.getElementById('gallery');
    const gridBtn = document.getElementById('gridBtn');
    const listBtn = document.getElementById('listBtn');

    if (view === 'list') {
      gallery.classList.add('list-view');
      listBtn.classList.add('active');
      gridBtn.classList.remove('active');
    } else {
      gallery.classList.remove('list-view');
      gridBtn.classList.add('active');
      listBtn.classList.remove('active');
    }
  }

  // ─── LIGHTBOX ─────────────────────────────────────────
  function openLightbox(index) {
    currentIndex = index;
    updateLightbox();
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  }

  function closeLightboxOnBg(e) {
    if (e.target === document.getElementById('lightbox')) closeLightbox();
  }

  function navigate(dir) {
    currentIndex = (currentIndex + dir + photos.length) % photos.length;
    updateLightbox();
  }

  function updateLightbox() {
    const photo = photos[currentIndex];
    const img = document.getElementById('lightboxImg');
    img.src = '';
    setTimeout(() => { img.src = getFullUrl(photo); }, 50);
    document.getElementById('lightboxName').textContent = photo.name.replace(/\.[^/.]+$/, '');
    document.getElementById('lightboxCounter').textContent = `${currentIndex + 1} / ${photos.length}`;
    document.getElementById('lightboxLink').href = photo.webViewLink || `https://drive.google.com/file/d/${photo.id}/view`;
  }

  // Keyboard navigation
  document.addEventListener('keydown', e => {
    const lb = document.getElementById('lightbox');
    if (!lb.classList.contains('open')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowRight') navigate(1);
    if (e.key === 'ArrowLeft') navigate(-1);
  });

  // ─── INIT ──────────────────────────────────────────────
  async function init() {
    try {
      photos = await fetchPhotos();
      const count = photos.length;

      document.getElementById('photoCount').textContent = `${count} photo${count !== 1 ? 's' : ''}`;
      document.getElementById('footerCount').textContent = `${count} image${count !== 1 ? 's' : ''} synced`;

      renderGallery();
    } catch (err) {
      console.error(err);
      document.getElementById('gallery').innerHTML = `
        <div class="message-box" style="grid-column:1/-1">
          <h2>Failed to load</h2>
          <p>${err.message}</p>
        </div>`;
    } finally {
      document.getElementById('loadingScreen').classList.add('hidden');
    }
  }

  init();
</script>
</body>
</html>
